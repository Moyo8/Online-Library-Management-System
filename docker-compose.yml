version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=olms
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: olms
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: olms
      MYSQL_PASSWORD: olms123
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/olms.sql:/docker-entrypoint-initdb.d/olms.sql:ro

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    links:
      - db
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    restart: always

volumes:
  db_data: